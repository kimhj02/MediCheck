# Docker 비특권(USER nginx) 실행용 — /var/cache/nginx 쓰기 불가 회피
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout combined;

    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path /tmp/nginx/proxy;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    scgi_temp_path /tmp/nginx/scgi;

    sendfile on;
    keepalive_timeout 65;

    # Expo 카카오 인가 state 접두(medichek_expo_webauth) — SPA 대신 최소 HTML만 응답해
    # iOS ASWebAuthenticationSession 이 https 콜백 후 React 로드까지 기다리며 시트가 안 닫히는 현상 완화
    map $args $kakao_oauth_expo_inapp {
        default 0;
        ~medichek_expo_webauth 1;
    }

    include /etc/nginx/conf.d/*.conf;
}
