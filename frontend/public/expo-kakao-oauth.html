<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediCheck</title>
</head>
<body style="margin:0;padding:24px;font-family:system-ui,sans-serif;color:#475569;font-size:15px;line-height:1.5">
  <p id="msg">앱으로 돌아가는 중입니다…</p>
  <script>
(function () {
  var msg = document.getElementById('msg');
  try {
    var q = new URLSearchParams(window.location.search);
    var code = q.get('code');
    var state = q.get('state');
    if (q.get('error')) {
      if (msg) msg.textContent = '로그인에 문제가 있습니다. 이 창을 닫고 앱에서 다시 시도해 주세요.';
      return;
    }
    if (!code || !state) {
      if (msg) msg.textContent = '앱에서 로그인을 마무리하고 있습니다. 잠시 후 이 창이 닫히면 앱 화면으로 돌아갑니다.';
      return;
    }
    var prefix = 'medichek_expo_webauth__';
    if (state.indexOf(prefix) !== 0) {
      if (msg) msg.textContent = '앱에서 로그인을 마무리하고 있습니다. 잠시 후 이 창이 닫히면 앱 화면으로 돌아갑니다.';
      return;
    }
    var rest = state.slice(prefix.length);
    var ix = rest.lastIndexOf('__');
    if (ix < 0) return;
    var enc = rest.slice(0, ix);
    var appReturnUrl = decodeURIComponent(enc);
    if (!appReturnUrl) return;
    var isExp = appReturnUrl.indexOf('exp://') === 0;
    var isAppScheme = appReturnUrl.indexOf('medicheck://') === 0;
    if (!isExp && !isAppScheme) return;
    var join = appReturnUrl.indexOf('?') >= 0 ? '&' : '?';
    window.location.replace(
      appReturnUrl + join + 'code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state)
    );
  } catch (e) {
    if (msg) msg.textContent = '앱으로 돌아가지 못했습니다. 이 창을 닫은 뒤 앱에서 다시 시도해 주세요.';
  }
})();
  </script>
</body>
</html>
