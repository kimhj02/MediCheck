server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # iOS Expo Go 브리지만: state 가 `medichek_expo_webauth__`(이중 언더스코어)로 시작할 때만 정적 HTML(exp:// 복귀).
    # Android Expo Go 등은 `medichek_expo_webauth.<uuid>` — 여기로내면 HTML이 exp 리다이렉트를 안 해 멈춘 것처럼 보일 수 있음 → SPA 콜백으로 둔다.
    location = /oauth/kakao/callback {
        if ($arg_state ~ "^medichek_expo_webauth__") {
            rewrite ^ /expo-kakao-oauth.html last;
        }
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
