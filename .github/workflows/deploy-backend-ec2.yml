# EC2에서 docker-compose.aws.yml 기준 backend 서비스만 재빌드·기동합니다.
#
# 필요한 GitHub Secrets (Repository → Settings → Secrets and variables → Actions):
#   EC2_HOST          예: 1.2.3.4 또는 ec2-xx.compute.amazonaws.com
#   EC2_USER          예: ubuntu, ec2-user
#   EC2_SSH_KEY       EC2 접속용 개인 키 전체(PEM, 줄바꿈 포함). Windows에서 복사 시 \r 제거함
#   EC2_DEPLOY_PATH   서버에서 compose 파일이 있는 디렉터리 절대 경로 (예: /home/ubuntu/MediCheck)
#   EC2_ENV_PROD      (선택) backend/server/.env.prod 전체 내용(KEY=value 줄바꿈). 설정 시 매 배포마다 EC2에 기록
#
# EC2_ENV_PROD 가 비어 있으면 EC2에 미리 backend/server/.env.prod 가 있어야 합니다.
# rsync는 .env* 를 제외해 서버의 env 파일이 --delete 로 지워지지 않게 합니다.

name: Deploy backend (EC2)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/server/**"
      - "docker-compose.aws.yml"
      - ".github/workflows/deploy-backend-ec2.yml"

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          # PEM에 \r 이 섞이면 OpenSSL 3에서 "error in libcrypto" → 인증 실패로 이어짐
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > "$HOME/.ssh/ec2_deploy"
          chmod 600 "$HOME/.ssh/ec2_deploy"
          if ! ssh-keygen -y -f "$HOME/.ssh/ec2_deploy" >/dev/null 2>&1; then
            echo "::error::EC2_SSH_KEY를 읽을 수 없습니다. Secret에 PEM 전체(BEGIN~END)만 넣었는지, 앞뒤 따옴표·공백 없이 다시 저장해 보세요."
            exit 1
          fi
          ssh-keyscan -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      - name: Rsync backend & compose
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          REMOTE_BASE: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          # -i·-o 는 rsync가 아니라 ssh에만 넘기려면 -e "ssh ..." 한 덩어리로 묶어야 함
          # (그렇지 않으면 rsync -i 가 itemize-changes로 해석되어 키가 전달되지 않음)
          SSH_OPTS="-i ${HOME}/.ssh/ec2_deploy -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes"
          rsync -az --delete -e "ssh $SSH_OPTS" \
            --exclude 'build/' \
            --exclude '.gradle/' \
            --exclude '.idea/' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./backend/server/ "${SSH_USER}@${SSH_HOST}:${REMOTE_BASE}/backend/server/"
          rsync -az --delete -e "ssh $SSH_OPTS" \
            ./docker-compose.aws.yml "${SSH_USER}@${SSH_HOST}:${REMOTE_BASE}/docker-compose.aws.yml"

      - name: Write .env.prod from Secret (optional)
        env:
          ENV_PROD: ${{ secrets.EC2_ENV_PROD }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          REMOTE_BASE: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${ENV_PROD:-}" ]; then
            echo "EC2_ENV_PROD Secret 없음 → EC2 기존 backend/server/.env.prod 사용"
            exit 0
          fi
          SSH_OPTS="-i ${HOME}/.ssh/ec2_deploy -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes"
          printf '%s\n' "$ENV_PROD" | tr -d '\r' | ssh $SSH_OPTS "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${REMOTE_BASE}/backend/server' && cat > '${REMOTE_BASE}/backend/server/.env.prod' && chmod 600 '${REMOTE_BASE}/backend/server/.env.prod'"

      - name: Docker Compose up (backend)
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          REMOTE_BASE: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -i "${HOME}/.ssh/ec2_deploy" -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; cd '${REMOTE_BASE}' && test -f backend/server/.env.prod || { echo '::error::backend/server/.env.prod 가 없습니다. GitHub에 EC2_ENV_PROD Secret을 추가하거나, EC2에서 해당 파일을 만드세요.'; exit 1; } && docker compose -f docker-compose.aws.yml up -d --build backend"
