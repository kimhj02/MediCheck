# EC2에서 docker-compose.aws.yml 기준 backend 서비스만 재빌드·기동합니다.
#
# 필요한 GitHub Secrets (Repository → Settings → Secrets and variables → Actions):
#   EC2_HOST          예: 1.2.3.4 또는 ec2-xx.compute.amazonaws.com
#   EC2_USER          예: ubuntu, ec2-user
#   EC2_SSH_KEY       EC2 접속용 개인 키 전체(PEM, 줄바꿈 포함)
#   EC2_DEPLOY_PATH   서버에서 compose 파일이 있는 디렉터리 절대 경로 (예: /home/ubuntu/MediCheck)
#
# 서버에는 docker compose(v2)와, compose가 참조하는 backend/server/.env.prod 가 미리 있어야 합니다.

name: Deploy backend (EC2)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/server/**"
      - "docker-compose.aws.yml"
      - ".github/workflows/deploy-backend-ec2.yml"

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2_deploy
          chmod 600 ~/.ssh/ec2_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync backend & compose
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          REMOTE_BASE: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          RSYNC="rsync -az --delete -e ssh -i ~/.ssh/ec2_deploy -o StrictHostKeyChecking=yes"
          $RSYNC \
            --exclude 'build/' \
            --exclude '.gradle/' \
            --exclude '.idea/' \
            ./backend/server/ "${SSH_USER}@${SSH_HOST}:${REMOTE_BASE}/backend/server/"
          $RSYNC ./docker-compose.aws.yml "${SSH_USER}@${SSH_HOST}:${REMOTE_BASE}/docker-compose.aws.yml"

      - name: Docker Compose up (backend)
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          REMOTE_BASE: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; cd '${REMOTE_BASE}' && docker compose -f docker-compose.aws.yml up -d --build backend"
