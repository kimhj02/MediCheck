services:
  backend:
    container_name: medicheck-backend
    build:
      context: ./backend/server
      dockerfile: Dockerfile
    env_file:
      - ./backend/server/.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    container_name: medicheck-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_KAKAO_APP_KEY: ${VITE_KAKAO_APP_KEY}
        VITE_KAKAO_REST_API_KEY: ${VITE_KAKAO_REST_API_KEY}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
